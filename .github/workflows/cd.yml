name: CD

# Runs when code lands on main, or when a semver tag is pushed (e.g. v1.2.0).
# Builds a container image, publishes it to GitHub Container Registry, then
# deploys it. The deploy step is the part most teams swap out - see the
# commented alternatives below.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    # "environment" lets you require manual approval and store env-scoped
    # secrets in Settings -> Environments -> production.
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      # --- Default: deploy over SSH to a plain VM/VPS running docker-compose ---
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker compose -f /opt/app/docker-compose.yml up -d --force-recreate

      # --- Alternative deploy targets ---
      # Pick ONE of these, remove the SSH step above and the others below.
      #
      # Deploy to AWS ECS:
      # - uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: us-east-1
      # - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      #   with:
      #     service: my-service
      #     cluster: my-cluster
      #     force-new-deployment: true
      #
      # Deploy to Azure Web App:
      # - uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: my-app
      #     images: ghcr.io/${{ env.IMAGE_NAME }}:latest
      #
      # Deploy to Kubernetes:
      # - uses: azure/setup-kubectl@v4
      # - run: kubectl set image deployment/my-app my-app=ghcr.io/${{ env.IMAGE_NAME }}:latest
      #
      # Deploy to Render / Fly.io / Heroku:
      # - run: curl -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
